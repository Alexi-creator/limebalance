name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set lowercase image name
        run: echo "IMAGE_NAME=ghcr.io/${GITHUB_REPOSITORY,,}" >> $GITHUB_ENV

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Check VPS configured
        id: vps
        run: |
          if [ -n "${{ secrets.SSH_HOST }}" ]; then
            echo "ready=true" >> $GITHUB_OUTPUT
          else
            echo "ready=false" >> $GITHUB_OUTPUT
            echo "SSH_HOST secret not set, skipping deploy"
          fi

      - name: Deploy to VPS
        if: steps.vps.outputs.ready == 'true'
        uses: appleboy/ssh-action@v1
        env:
          GHCR_IMAGE: ${{ env.IMAGE_NAME }}:latest
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GHCR_ACTOR: ${{ github.actor }}
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          envs: GHCR_IMAGE,GHCR_TOKEN,GHCR_ACTOR
          script: |
            set -e

            echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_ACTOR" --password-stdin

            cd /opt/myapp

            echo "::group::Pull new image"
            docker pull "$GHCR_IMAGE"
            echo "::endgroup::"

            echo "::group::Run migrations"
            docker run --rm --env-file .env --network host "$GHCR_IMAGE" npm run migration:run
            echo "::endgroup::"

            echo "::group::Restart app"
            docker stop expense-accounting 2>/dev/null || true
            docker rm expense-accounting 2>/dev/null || true
            docker run -d \
              --name expense-accounting \
              --env-file .env \
              --restart unless-stopped \
              --network host \
              "$GHCR_IMAGE"
            echo "::endgroup::"

            echo "::group::Cleanup old images"
            docker image prune -f --filter "until=72h"
            echo "::endgroup::"
